<script>
const Upload = {
  arquivoParaBase64: (file) => {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => {
        const base64Content = reader.result.split(',')[1];
        resolve({ name: file.name, type: file.type, base64Content });
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  },

  getFileName: (file, index) => {
    if (!file.name || file.name === 'image.png') {
      return `print_${Date.now()}_${index + 1}.png`;
    }

    return file.name;
  },

  handleFileInput: (event, fileStore, previewContainer) => {
    const selectedFiles = Array.from(event.target.files || []);
    Upload.addFiles(selectedFiles, fileStore, previewContainer, event.target);
  },

  handlePaste: (event, fileStore, previewContainer, fileInput) => {
    const clipboardItems = Array.from((event.clipboardData || event.originalEvent.clipboardData).items || []);
    const imageFiles = clipboardItems
      .filter((item) => item.type.startsWith('image/'))
      .map((item) => item.getAsFile())
      .filter(Boolean);

    if (!imageFiles.length) {
      return;
    }

    Upload.addFiles(imageFiles, fileStore, previewContainer, fileInput);
  },

  addFiles: (files, fileStore, previewContainer, fileInput) => {
    files.forEach((file, index) => {
      const fileName = Upload.getFileName(file, index);
      const normalizedFile = new File([file], fileName, { type: file.type });
      fileStore.push(normalizedFile);
    });

    Upload.updateFileInput(fileInput, fileStore);
    Upload.renderPreview(fileStore, previewContainer, fileInput);
  },

  updateFileInput: (fileInput, fileStore) => {
    const dataTransfer = new DataTransfer();
    fileStore.forEach((file) => dataTransfer.items.add(file));
    fileInput.files = dataTransfer.files;
  },

  renderPreview: (fileStore, previewContainer, fileInput) => {
    previewContainer.innerHTML = '';

    fileStore.forEach((file, index) => {
      const previewItem = document.createElement('div');
      previewItem.className = 'preview-item';

      const isImage = file.type.startsWith('image/');
      if (isImage) {
        const image = document.createElement('img');
        const reader = new FileReader();
        reader.onload = (event) => { image.src = event.target.result; };
        reader.readAsDataURL(file);
        previewItem.appendChild(image);
      } else {
        const icon = document.createElement('div');
        icon.className = 'file-icon';
        icon.innerHTML = Upload.getFileIcon(file.name);
        previewItem.appendChild(icon);
      }

      const nameLabel = document.createElement('span');
      nameLabel.className = 'file-name';
      nameLabel.innerText = file.name;
      previewItem.appendChild(nameLabel);

      const removeButton = document.createElement('button');
      removeButton.className = 'btn-remove';
      removeButton.type = 'button';
      removeButton.innerText = '✖ Remover';
      removeButton.addEventListener('click', (event) => {
        event.stopPropagation();
        fileStore.splice(index, 1);
        Upload.updateFileInput(fileInput, fileStore);
        Upload.renderPreview(fileStore, previewContainer, fileInput);
      });

      previewItem.appendChild(removeButton);
      previewContainer.appendChild(previewItem);
    });
  },

  getFileIcon: (name) => {
    const extension = name.split('.').pop().toLowerCase();
    if (['xlsx', 'xls', 'csv'].includes(extension)) {
      return '📊';
    }
    if (['doc', 'docx'].includes(extension)) {
      return '📝';
    }
    if (extension === 'pdf') {
      return '📕';
    }
    return '📄';
  },

  initializePreviewState: (companyElement, fileStore, previewContainer, fileInput) => {
    companyElement.fileStore = fileStore;
    companyElement.previewContainer = previewContainer;
    companyElement.fileInput = fileInput;
    Upload.updateFileInput(fileInput, fileStore);
  },
};
</script>
