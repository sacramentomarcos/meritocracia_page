<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Avaliação de Empresas</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Roboto,sans-serif;
}

body{

background:#f0ebf8;
padding:40px;
}

.form{

max-width:900px;
margin:auto;

}

.top{

height:12px;
background:#673ab7;
border-radius:12px 12px 0 0;

}

.card{

background:white;
padding:35px;
border-radius:0 0 12px 12px;
box-shadow:0 2px 6px rgba(0,0,0,.15);

}

h1{

font-size:30px;
margin-bottom:10px;

}

.subtitle{

color:#555;
margin-bottom:40px;

}

.header{

display:grid;
grid-template-columns:1fr 100px 100px;
padding-bottom:15px;
font-weight:bold;
border-bottom:2px solid #ddd;

}

.company{

padding:18px 0;
border-bottom:1px solid #eee;

}

.company-line{

display:grid;
grid-template-columns:1fr 100px 100px;
align-items:center;

}

.extra{

display:none;
margin-top:20px;
padding:20px;
background:#fafafa;
border-left:4px solid #673ab7;
border-radius:8px;

}

.extra textarea{

width:100%;
height:120px;
margin-top:10px;
margin-bottom:20px;
padding:12px;

}

.extra input[type=file]{

margin-top:10px;

}

button{

margin-top:40px;
background:#673ab7;
color:white;
padding:14px 40px;
font-size:16px;
border:none;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#5d35a4;

}

</style>

</head>

<body>
<div class="form">

    <!-- ===================== -->
    <!-- TELA 1 -->
    <!-- ===================== -->

    <div id="screenSelect" class="screen">

        <div class="top"></div>

        <div class="card">

            <h1>Publicação de Resultados</h1>

            <p class="subtitle">
                Selecione a rotina que deseja publicar.
            </p>

            <select id="rotina" style="width:100%;padding:12px;font-size:16px;">

                <option value="">Selecione...</option>

                <option>Auditoria Operacional</option>

                <option>Auditoria Comercial</option>

                <option>Limpeza</option>

                <option>Segurança</option>

            </select>

            <button onclick="continuar()">
                Continuar
            </button>

        </div>

    </div>



    <!-- ===================== -->
    <!-- TELA 2 -->
    <!-- ===================== -->

    <div id="screenForm" class="screen" style="display:none;">

        <div class="top"></div>

        <div class="card">

            <h1 id="tituloRotina"></h1>

            <p class="subtitle">

                Verifique se cada empresa está aderente.

                Caso responda <b>NÃO</b>, será necessário justificar e anexar evidências.

            </p>

            <div class="header">

                <div>Empresa</div>

                <div>SIM</div>

                <div>NÃO</div>

            </div>

            <div id="lista"></div>

            <button onclick="enviar()">

                Enviar

            </button>

        </div>

    </div>



    <!-- ===================== -->
    <!-- TELA 3 -->
    <!-- ===================== -->

    <div id="screenSuccess" class="screen" style="display:none;">

        <div class="top"></div>

        <div class="card" style="text-align:center;">

            <h1>✔ Cadastro realizado</h1>

            <p class="subtitle">

                Os resultados foram registrados com sucesso.

            </p>

            <button onclick="novaRotina()">

                Publicar outra rotina

            </button>

        </div>

    </div>

</div>
<script>
const empresas = [

"002 - VIAÇÃO VIÇOSA LTDA",

"003 - COLETIVOS RIO BRANCO",

"004 - VIAÇÃO UBÁ",

"009 - SV TRANSPORTES LTDA",

"011 - EXPRESSO TRÊS FRONTEIRAS",

"012 - EXPRESSO PLANALTO LTDA",

"015 - SV TRANSPORTES",

"022 - SV TRANSPORTES LAFAIETE",

"027 - ANSAL"

];


//=========================================
// Navegação
//=========================================

function mostrarTela(id){

    document
        .querySelectorAll(".screen")
        .forEach(t=>t.style.display="none");

    document
        .getElementById(id)
        .style.display="block";

}


//=========================================
// Tela 1
//=========================================

function continuar(){

    const rotina=document.getElementById("rotina").value;

    if(rotina===""){

        alert("Selecione uma rotina.");

        return;

    }

    document.getElementById("tituloRotina").innerText=rotina;

    construirFormulario();

    mostrarTela("screenForm");

}



//=========================================
// Construção dinâmica
//=========================================

function construirFormulario(){

    const lista=document.getElementById("lista");

    lista.innerHTML="";

    empresas.forEach((empresa,i)=>{

        const div=document.createElement("div");

        div.className="company";

        div.innerHTML=`

        <div class="company-line">

            <div>${empresa}</div>

            <div>

                <input
                    type="radio"
                    name="empresa${i}"
                    value="SIM">

            </div>

            <div>

                <input
                    type="radio"
                    name="empresa${i}"
                    value="NAO">

            </div>

        </div>

        <div class="extra">

            <label>

                <b>Justificativa *</b>

            </label>

            <textarea
                placeholder="Explique o motivo..."></textarea>

            <label>

                <b>Anexo *</b>

            </label>

            <input
                type="file">

        </div>

        `;

        lista.appendChild(div);

        const radios=div.querySelectorAll("input[type=radio]");

        const extra=div.querySelector(".extra");

        radios.forEach(r=>{

            r.addEventListener("change",()=>{

                extra.style.display=
                    r.value==="NAO"
                    ? "block"
                    : "none";

            });

        });

    });

}



//=========================================
// Envio
//=========================================

function enviar(){

    const resultados=[];

    empresas.forEach((empresa,i)=>{

        const radio=document.querySelector(`input[name="empresa${i}"]:checked`);

        if(!radio){

            alert("Responda todas as empresas.");

            throw "";

        }

        const company=document.querySelectorAll(".company")[i];

        const texto=company.querySelector("textarea").value;

        const arquivoInput=company.querySelector("input[type=file]").files[0];

        const arquivo = arquivoInput.files[0];

        // Se respondeu NÃO, precisa justificar OU anexar um arquivo
        if (radio.value === "NAO" && texto === "" && !arquivo) {

            alert(
                `A empresa "${empresa}" foi marcada como NÃO.\n\n` +
                "É obrigatório informar uma justificativa ou anexar um arquivo."
            );

            return;

        }


        resultados.push({

            empresa,

            status:radio.value,

            justificativa:texto,

            arquivo

        });

    });

    console.log(resultados);

    /*
    google.script.run
    .withSuccessHandler(()=>{

        mostrarTela("screenSuccess");

    })
    .salvar(resultados);
    */

    mostrarTela("screenSuccess");

}



//=========================================
// Reinício
//=========================================

function novaRotina(){

    document.getElementById("rotina").value="";

    document.getElementById("lista").innerHTML="";

    mostrarTela("screenSelect");

}
</script>

</body>

</html>
